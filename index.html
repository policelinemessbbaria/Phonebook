<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ডিজিটাল ফোনবুক</title>
    <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#006a4e">

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('Service Worker Registered!', reg))
        .catch(err => console.log('Service Worker Error', err));
    });
  }
</script>
    <style>
        :root {
            --primary-color: #006a4e;
            --secondary-color: #f42a41;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333333;
            --label-color: #666;
        }
        body {
            font-family: 'SolaimanLipi', 'Kalpurush', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            color: var(--text-color);
            -webkit-font-smoothing: antialiased;
        }
        header {
            background-color: var(--primary-color);
            color: white;
            padding: 10px 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 800px;
            margin: 0 auto;
        }
        .header-title {
            text-align: left;
        }
        header h1 { margin: 0; font-size: 1.3rem; line-height: 1.2; }
        header p { margin: 3px 0 0 0; font-size: 0.85rem; opacity: 0.9; }
        
        .btn-add-header {
            background-color: white;
            color: var(--primary-color);
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }
        .btn-add-header:hover {
            transform: scale(1.05);
            background-color: #f0fdf4;
        }

        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 0 15px;
            padding-bottom: 80px;
        }
        
        /* সার্চ এবং ফিল্টার এরিয়া */
        .search-box {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            text-align: center;
        }
        .filter-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 15px;
            justify-content: center;
        }
        .filter-row .form-group {
            flex: 1;
            min-width: 140px;
            max-width: 250px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 10px;
            text-align: left;
        }
        .form-group label {
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 0.9rem;
        }
        input, select {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
            font-family: inherit;
        }
        .input-group { display: flex; justify-content: center; }
        #searchInput { border-radius: 5px 0 0 5px; text-align: center; }
        .btn-search {
            background-color: var(--primary-color);
            color: white;
            border: 1px solid var(--primary-color);
            padding: 0 20px;
            border-radius: 0 5px 5px 0;
            cursor: pointer;
            font-size: 1.2rem;
        }
        .btn-search:hover { background-color: #00503a; }

        /* === ১. কমপ্যাক্ট ভিউ (হোম পেজ) === */
        .compact-card {
            background: var(--card-bg);
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s;
            border-radius: 8px;
            margin-bottom: 8px;
            border: 1px solid transparent;
        }
        .compact-card:hover { 
            background-color: #f0fdf4; 
            border-color: #c8e6c9;
        }
        
        .compact-left { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            flex-wrap: wrap;
        }
        .compact-brush { 
            font-weight: bold; 
            color: var(--primary-color); 
            font-size: 0.85rem; 
            background: #e8f5e9;
            padding: 2px 6px;
            border-radius: 4px;
        }
        .compact-rank {
            font-size: 0.8rem;
            background: #e3f2fd;
            color: #1565c0;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
        }
        .compact-name { 
            font-size: 1rem; 
            color: #333; 
            font-weight: 600;
        }
        
        /* === ২. ফুল কার্ড ভিউ (সার্চ রেজাল্ট) === */
        .full-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            text-align: center;
            border-top: 5px solid var(--primary-color);
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .profile-pic-container {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid #eee;
            background-color: #f0f0f0;
            margin: 0 auto 15px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .profile-pic {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .rank-badge {
            display: inline-block;
            background: #e9ecef;
            color: #555;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .user-name {
            font-size: 1.5rem;
            font-weight: bold;
            margin: 5px 0 15px 0;
            color: var(--primary-color);
        }
        .office-badge {
            background-color: #e3f2fd;
            color: #0d47a1;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 0.95rem;
            display: inline-block;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
            background: #fafafa;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #eee;
        }
        .info-item { text-align: left; font-size: 0.95rem; }
        .info-label { color: var(--label-color); font-size: 0.8rem; display: block; margin-bottom: 2px; }
        .info-value { font-weight: 600; color: #000; font-size: 1rem; }

        .action-section {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .btn-action {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 8px 18px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
            border: 1px solid #c8e6c9;
            transition: all 0.2s;
        }
        .btn-action:hover { background: #c8e6c9; transform: translateY(-2px); }
        
        /* WhatsApp specific style (reuse .btn-action structure but allow variance) */
        .btn-whatsapp {
            background: #dcf8c6; /* WhatsApp light green */
            color: #075e54;    /* WhatsApp dark green */
            border: 1px solid #a5d6a7;
        }
        .btn-whatsapp:hover { background: #c5e1a5; }

        .btn-edit {
            background-color: var(--secondary-color);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            margin-top: 15px;
            width: 100%;
            max-width: 220px;
            box-shadow: 0 4px 6px rgba(244, 42, 65, 0.3);
            transition: background 0.3s;
        }
        .btn-edit:hover { background-color: #d61e33; }
        
        .btn-back {
            background: #fff;
            color: #555;
            padding: 6px 15px;
            border-radius: 15px;
            text-decoration: none;
            font-size: 0.85rem;
            display: inline-block;
            margin-bottom: 10px;
            border: 1px solid #ddd;
        }
        .btn-back:hover { background: #f5f5f5; }

        /* Modal Styles (Shared for Edit & Add) */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(3px);
        }
        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 15px;
            width: 95%;
            max-width: 480px;
            max-height: 90vh;
            overflow-y: auto;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .close-btn { 
            float: right; font-size: 1.8rem; cursor: pointer; background: none; border: none; color: #999; line-height: 1;
        }
        .close-btn:hover { color: #333; }
        
        /* লেবেল ট্যাগ ব্যবহার করা হয়েছে ক্রোমের সমস্যা সমাধানের জন্য */
        .image-upload-area {
            display: flex; /* Block to Flex */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px dashed #bbb;
            padding: 15px;
            text-align: center;
            border-radius: 8px;
            margin-bottom: 15px;
            cursor: pointer;
            height: 160px;
            overflow: hidden;
            position: relative;
            background: #fafafa;
            transition: border 0.2s;
            user-select: none; /* টেক্সট সিলেকশন বন্ধ করা */
            -webkit-tap-highlight-color: transparent;
        }
        .image-upload-area:hover { border-color: var(--primary-color); background: #f0fdf4; }
        
        .preview-img {
            width: 100%; height: 100%; object-fit: contain; position: absolute; top:0; left:0; display: none;
            z-index: 2;
            pointer-events: none; /* ছবিতে ক্লিক করলে ক্লিক লেবেলে চলে যাবে */
        }
        .btn-submit {
            background: var(--primary-color); color: white; border: none;
            padding: 12px 20px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 10px;
            font-size: 1rem; font-weight: bold;
        }
        .btn-submit.add { background-color: #2e7d32; } /* Green for Add */
        
        .btn-cancel {
            background: #e0e0e0; border: none; padding: 12px 20px;
            border-radius: 8px; cursor: pointer; width: 100%; margin-top: 8px; font-weight: 600; color: #333;
        }
        
        /* Toast Notification */
        #toast {
            visibility: hidden; min-width: 280px; background-color: #333; color: #fff;
            text-align: center; border-radius: 50px; padding: 14px; position: fixed;
            z-index: 2000; left: 50%; bottom: 30px; transform: translateX(-50%);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); font-weight: 500;
        }
        #toast.show { visibility: visible; animation: fadein 0.4s, fadeout 0.4s 2.6s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }

        /* Loader */
        .loader-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

<header>
    <div class="header-content">
        <div class="header-title">
            <h1>জেলা পুলিশ, ব্রাহ্মণবাড়িয়া</h1>
            <p>ডিজিটাল ফোনবুক</p>
        </div>
        <button class="btn-add-header" onclick="openAddModal()">+ নতুন সদস্য</button>
    </div>
</header>

<main class="container">
    <div class="search-box">
        <div class="filter-row">
            <div class="form-group">
                <label for="rankFilter">পদবী</label>
                <select id="rankFilter" onchange="filterData()">
                    <option value="">সকল পদবী</option>
                </select>
            </div>
            <div class="form-group">
                <label for="officeFilter">কর্মরত/অফিস</label>
                <select id="officeFilter" onchange="filterData()">
                    <option value="">সকল অফিস</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>ব্রাশ/নাম/বিপি নাম্বার দিয়ে অনুসন্ধান করুন</label>
            <div class="input-group">
                <input type="text" id="searchInput" placeholder="যেমন:১০১৪/সুজন/৯৯১৮২১৫৮০৫...">
                <button class="btn-search" onclick="filterData()">🔍</button>
            </div>
        </div>
    </div>
    
    <!-- লোডার -->
    <div id="loader" style="display:none;">
        <div class="loader-spinner"></div>
        <p style="text-align:center; color:#666;">ডেটা লোড হচ্ছে...</p>
    </div>
    
    <!-- রেজাল্ট এরিয়া -->
    <div id="result-area"></div>
</main>

<!-- Edit Modal -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <div style="overflow:hidden;">
            <button class="close-btn" onclick="closeModal('editModal')">&times;</button>
            <h3 style="margin-bottom: 20px; color: var(--primary-color);">তথ্য হালনাগাদ করুন</h3>
        </div>
        <form id="editForm" onsubmit="submitEdit(event)">
            <input type="hidden" id="editBpNo">
            
            <div style="display: flex; gap: 10px;">
                <div class="form-group" style="flex:1">
                    <label>র‍্যাঙ্ক</label>
                    <input type="text" id="displayRank" disabled style="background:#eee; color:#555;">
                </div>
                <div class="form-group" style="flex:1">
                    <label>ব্রাশ নং</label>
                    <input type="text" id="displayBrushNo" disabled style="background:#eee; color:#555;">
                </div>
            </div>

            <div class="form-group">
                <label>প্রোফাইল ছবি (১:১ রেশিও)</label>
                <!-- লেবেল এবং for অ্যাট্রিবিউট ব্যবহার করা হয়েছে -->
                <label class="image-upload-area" for="editPhoto">
                    <span id="uploadPlaceholderEdit" style="font-size: 2rem; pointer-events: none;">📷<br><span style="font-size:0.9rem; color:#666;">ছবি সিলেক্ট করুন</span></span>
                    <img id="previewEditPhoto" class="preview-img">
                    <input type="file" id="editPhoto" accept="image/*" style="display:none;" onchange="previewImage(this, 'previewEditPhoto', 'uploadPlaceholderEdit')">
                </label>
            </div>

            <div class="form-group">
                <label>নাম (Name)</label>
                <input type="text" id="editName" required>
            </div>
            <div class="form-group">
                <label>বিপি নাম্বার (BP Number)</label>
                <input type="text" id="editNewBpNo" required>
            </div>
            <div class="form-group">
                <label>মোবাইল নাম্বার</label>
                <input type="tel" id="editMobile" required>
            </div>
            <div class="form-group">
                <label>কর্মরত (Office/Unit)</label>
                <input type="text" id="editOffice" required placeholder="যেমন: SAF রেগুলার/ D- স্টো/মেজর অফিস/ মেস...">
            </div>

            <button type="button" class="btn-cancel" onclick="closeModal('editModal')">বাতিল</button>
            <button type="submit" class="btn-submit">সাবমিট করুন</button>
        </form>
    </div>
</div>

<!-- Add Member Modal -->
<div id="addModal" class="modal">
    <div class="modal-content">
        <div style="overflow:hidden;">
            <button class="close-btn" onclick="closeModal('addModal')">&times;</button>
            <h3 style="margin-bottom: 20px; color: #2e7d32;">নতুন সদস্য যুক্ত করুন</h3>
        </div>
        <form id="addForm" onsubmit="submitAdd(event)">
            
            <div style="display: flex; gap: 10px;">
                <div class="form-group" style="flex:1">
                    <label>র‍্যাঙ্ক</label>
                    <!-- এখানে ইনপুট এর বদলে সিলেক্ট ড্রপডাউন বসানো হয়েছে -->
                    <select id="addRank" required>
                        <option value="" disabled selected>পদবী নির্বাচন করুন</option>
                        <!-- জাভাস্ক্রিপ্ট দিয়ে এখানে অপশন লোড হবে -->
                    </select>
                </div>
                <div class="form-group" style="flex:1">
                    <label>ব্রাশ নং</label>
                    <input type="text" id="addBrushNo" required placeholder="যেমন: 1014 বা ১০১৪">
                </div>
            </div>

            <div class="form-group">
                <label>প্রোফাইল ছবি</label>
                <!-- লেবেল এবং for অ্যাট্রিবিউট ব্যবহার করা হয়েছে -->
                <label class="image-upload-area" for="addPhoto">
                    <span id="uploadPlaceholderAdd" style="font-size: 2rem; pointer-events: none;">📷<br><span style="font-size:0.9rem; color:#666;">ছবি সিলেক্ট করুন</span></span>
                    <img id="previewAddPhoto" class="preview-img">
                    <input type="file" id="addPhoto" accept="image/*" style="display:none;" onchange="previewImage(this, 'previewAddPhoto', 'uploadPlaceholderAdd')">
                </label>
            </div>

            <div class="form-group">
                <label>নাম (Name)</label>
                <input type="text" id="addName" required>
            </div>
            <div class="form-group">
                <label>বিপি নাম্বার (BP Number)</label>
                <input type="text" id="addBpNo" required>
            </div>
            <div class="form-group">
                <label>মোবাইল নাম্বার</label>
                <input type="tel" id="addMobile" required>
            </div>
            <div class="form-group">
                <label>কর্মরত (Office/Unit)</label>
                <input type="text" id="addOffice" required placeholder="যেমন: SAF রেগুলার/ D- স্টো/মেজর অফিস/ মেস...">
            </div>

            <button type="button" class="btn-cancel" onclick="closeModal('addModal')">বাতিল</button>
            <button type="submit" class="btn-submit add">সদস্য যুক্ত করুন</button>
        </form>
    </div>
</div>

<div id="toast">মেসেজ</div>

<script>
    // === কনফিগারেশন ===
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbzDbu3IL8xFyygtHe5GpqB9Z4qwYHyyVFXPO2IAA4dp62VgerwTMLeCOxcmSKm2Q1YNkw/exec"; 
    
    let allData = [];
    const bn2enMap = {
        '০': '0', '১': '1', '২': '2', '৩': '3', '৪': '4',
        '৫': '5', '৬': '6', '৭': '7', '৮': '8', '৯': '9'
    };

    function convertBnToEn(str) {
        if (!str) return '';
        return str.toString().replace(/[০-৯]/g, m => bn2enMap[m]);
    }

    window.addEventListener('DOMContentLoaded', () => {
        initApp();
    });

    document.getElementById("searchInput").addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            event.preventDefault();
            filterData();
        }
    });

    function scrollToElement(elementId) {
        const element = document.getElementById(elementId);
        const header = document.querySelector('header');
        if(element && header){
            const headerOffset = header.offsetHeight + 15;
            const elementPosition = element.getBoundingClientRect().top;
            const offsetPosition = elementPosition + window.pageYOffset - headerOffset;
            window.scrollTo({ top: offsetPosition, behavior: "smooth" });
        }
    }

    function showUserDetails(bpNo) {
        const user = allData.find(u => u.bpNo === bpNo);
        if (user) {
            renderData([user], 'full');
            scrollToElement('result-area');
            // History API Added
            history.pushState({ view: 'detail' }, '', '');
        }
    }

    // ==========================================
    //  OLD LOGIC: Init, Fetch, Cache, Render, Filter, Edit
    // ==========================================

    async function initApp() {
        const loader = document.getElementById('loader');
        loader.style.display = 'block';
        
        const cachedRaw = localStorage.getItem('policeDirectoryCache');
        let cachedData = null;
        let localVersion = 0;

        if (cachedRaw) {
            try {
                const parsed = JSON.parse(cachedRaw);
                cachedData = parsed.data;
                localVersion = parsed.lastUpdated || 0;
                
                if (cachedData && cachedData.length > 0) {
                    allData = cachedData;
                    populateFilters(allData);
                    renderData(allData, 'compact');
                    loader.style.display = 'none';
                }
            } catch (e) { console.error("Cache parse error:", e); }
        }

        try {
            const response = await fetch(GAS_API_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'getAllData' })
            });
            const result = await response.json();

            if (result.status === 'success') {
                const serverVersion = result.lastUpdated || 0;
                if (serverVersion > localVersion) {
                    allData = result.data;
                    const dataToStore = { data: allData, lastUpdated: serverVersion };
                    localStorage.setItem('policeDirectoryCache', JSON.stringify(dataToStore));
                    populateFilters(allData);
                    renderData(allData, 'compact');
                    if(serverVersion > localVersion && localVersion !== 0) showToast('ডাটা আপডেট হয়েছে।');
                }
            }
        } catch (error) {
            console.error("Fetch error:", error);
            if(!cachedData) showToast('সার্ভার কানেকশন এরর। ইন্টারনেট চেক করুন।');
        } finally {
            loader.style.display = 'none';
        }
    }

    function populateFilters(data) {
        // === ১. শিট অর্ডার অনুযায়ী র‍্যাঙ্ক লিস্ট তৈরি করা (Sheet Order Priority) ===
        const uniqueRanks = new Set();
        const orderedRanks = [];

        // ডাটা অ্যারেকে লুপ করা হচ্ছে (Row 0 থেকে শেষ পর্যন্ত)
        for (const item of data) {
            const rank = item.rank;
            // যদি র‍্যাঙ্কটি আগে লিস্টে যোগ করা না হয়, তবে যোগ করা হবে
            // এটি শিটের উপরের দিক থেকে নিচের দিক পর্যন্ত র‍্যাঙ্ক পিক করবে
            if (rank && !uniqueRanks.has(rank)) {
                uniqueRanks.add(rank);
                orderedRanks.push(rank);
            }
        }

        // === ২. অফিসের লিস্ট তৈরি করা (A-Z সর্ট থাকবে) ===
        const offices = new Set(data.map(item => item.office).filter(o => o));
        const sortedOffices = Array.from(offices).sort();

        // --- A. সার্চ ফিল্টার (Rank) ---
        const rankSelect = document.getElementById('rankFilter');
        if (rankSelect.options.length <= 1) {
            orderedRanks.forEach(rank => {
                const option = document.createElement('option');
                option.value = rank;
                option.textContent = rank;
                rankSelect.appendChild(option);
            });
        }

        // --- B. সার্চ ফিল্টার (Office) ---
        const officeSelect = document.getElementById('officeFilter');
        if (officeSelect.options.length <= 1) {
            sortedOffices.forEach(office => {
                const option = document.createElement('option');
                option.value = office;
                option.textContent = office;
                officeSelect.appendChild(option);
            });
        }

        // --- C. নতুন সদস্য ড্রপডাউন (Rank) ---
        const addRankSelect = document.getElementById('addRank');
        // আগের অপশনগুলো ক্লিয়ার করে ডিফল্ট অপশন বসানো
        addRankSelect.innerHTML = '<option value="" disabled selected>পদবী নির্বাচন করুন</option>';
        
        orderedRanks.forEach(rank => {
            const option = document.createElement('option');
            option.value = rank;
            option.textContent = rank;
            addRankSelect.appendChild(option);
        });
    }

    function renderData(data, viewType) {
        const container = document.getElementById('result-area');
        container.innerHTML = '';
        if (data.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:40px; color:#888;">⚠️ কোনো তথ্য পাওয়া যায়নি।</div>';
            return;
        }

        data.forEach((user) => {
            const mobileEn = convertBnToEn(user.mobile);
            
            // === WhatsApp Number Logic ===
            // যেহেতু ডাটাবেসে কান্ট্রি কোড নেই, তাই আমরা এখানে লজিক বসাবো
            let waNum = mobileEn.replace(/\D/g, ''); // সব নন-ডিজিট রিমুভ করা
            if (waNum.startsWith('0')) {
                waNum = '880' + waNum.substring(1);
            } else if (!waNum.startsWith('88')) {
                // যদি শুরুতে 0 না থাকে এবং 88 ও না থাকে, তবে 880 যুক্ত করা
                waNum = '880' + waNum;
            }
            const whatsappLink = `https://wa.me/${waNum}`;
            // ===============================

            const userImg = user.photo ? user.photo : 'https://ui-avatars.com/api/?name=' + encodeURIComponent(user.name) + '&background=random';
            
            const card = document.createElement('div');

            if (viewType === 'full') {
                card.className = 'full-card';
                card.innerHTML = `
                    <div style="margin-bottom:10px; text-align: left;">
                        <a href="#" onclick="renderData(allData, 'compact'); return false;" class="btn-back">⬅ তালিকায় ফিরে যান</a>
                    </div>
                    <div class="profile-pic-container">
                        <img src="${userImg}" class="profile-pic" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(user.name)}&background=random'" alt="Profile">
                    </div>
                    <span class="rank-badge">${user.rank}</span>
                    <h3 class="user-name">${user.name}</h3>
                    ${user.office ? `<div class="office-badge">${user.office}</div>` : ''}
                    
                    <div class="info-grid">
                        <div class="info-item"><span class="info-label">ব্রাশ নং</span><span class="info-value">${user.brushNo}</span></div>
                        <div class="info-item"><span class="info-label">বিপি নং</span><span class="info-value">${user.bpNo}</span></div>
                        <div class="info-item" style="grid-column: span 2;"><span class="info-label">মোবাইল</span><span class="info-value" style="direction: ltr;">${mobileEn}</span></div>
                    </div>

                    <div class="action-section">
                        <a href="tel:${mobileEn}" class="btn-action">📞 কল করুন</a>
                        <a href="${whatsappLink}" target="_blank" class="btn-action btn-whatsapp">💬 হোয়াটসঅ্যাপ</a>
                        <button onclick="copyToClipboard('${mobileEn}')" class="btn-action">📋 নম্বর কপি</button>
                    </div>
                    
                    <button class="btn-edit" onclick="openEditModal('${user.bpNo}', '${user.rank}', '${user.brushNo}', '${user.name}', '${user.bpNo}', '${user.mobile}', '${user.office || ''}', '${user.photo || ''}')">
                        ✏️ এডিট করুন
                    </button>
                `;
            } else {
                card.className = 'compact-card';
                card.onclick = () => showUserDetails(user.bpNo);
                card.innerHTML = `
                    <div class="compact-left">
                        <span class="compact-brush">ব্রাশ: ${user.brushNo}</span>
                        <span class="compact-rank">${user.rank}</span>
                        <span class="compact-name">${user.name}</span>
                    </div>
                    <div style="color:var(--primary-color);">➤</div>
                `;
            }
            container.appendChild(card);
        });
    }

    function filterData() {
        const searchInput = document.getElementById('searchInput');
        const rankFilter = document.getElementById('rankFilter');
        const officeFilter = document.getElementById('officeFilter');
        
        const query = searchInput.value.trim();
        const queryEn = convertBnToEn(query);
        const rank = rankFilter.value;
        const office = officeFilter.value;

        const filtered = allData.filter(user => {
            const matchRank = rank === '' || user.rank === rank;
            const matchOffice = office === '' || user.office === office;
            let matchSearch = false;
            if (query === '') { matchSearch = true; } else {
                const brushEn = convertBnToEn(user.brushNo);
                const bpEn = convertBnToEn(user.bpNo);
                const nameEn = user.name.toLowerCase();
                const queryLower = query.toLowerCase();
                if (brushEn.includes(queryEn) || bpEn.includes(queryEn) || nameEn.includes(queryLower)) { matchSearch = true; }
            }
            return matchRank && matchOffice && matchSearch;
        });
        
        const isActiveSearch = (query !== '' || rank !== '' || office !== '');
        if (isActiveSearch) { 
            renderData(filtered, 'full'); 
            scrollToElement('result-area');
            // History API Added
            history.pushState({ view: 'search' }, '', '');
        } else { 
            renderData(filtered, 'compact'); 
        }
    }

    function copyToClipboard(text) {
        navigator.clipboard.writeText(text).then(() => showToast('নাম্বার কপি হয়েছে!')).catch(() => showToast('কপি করতে ব্যর্থ হয়েছে।'));
    }

    // ==========================================
    //  EDIT & ADD MODAL LOGIC
    // ==========================================

    function previewImage(input, imgId, placeholderId) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = document.getElementById(imgId);
                img.src = e.target.result;
                img.style.display = 'block';
                document.getElementById(placeholderId).style.display = 'none';
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    function openEditModal(bpNo, rank, brushNo, name, bp, mobile, office, photo) {
        document.getElementById('editBpNo').value = bpNo;
        document.getElementById('displayRank').value = rank;
        document.getElementById('displayBrushNo').value = brushNo;
        document.getElementById('editName').value = name;
        document.getElementById('editNewBpNo').value = bp;
        document.getElementById('editMobile').value = mobile;
        document.getElementById('editOffice').value = office;
        
        // === FIX: Clone and replace file input to reset state (Chrome Fix) ===
        const oldInput = document.getElementById('editPhoto');
        const newInput = oldInput.cloneNode(true);
        oldInput.parentNode.replaceChild(newInput, oldInput);
        
        const imgPreview = document.getElementById('previewEditPhoto');
        const placeholder = document.getElementById('uploadPlaceholderEdit');
        
        if (photo) {
            imgPreview.src = photo;
            imgPreview.style.display = 'block';
            placeholder.style.display = 'none';
        } else {
            imgPreview.style.display = 'none'; imgPreview.src = ''; placeholder.style.display = 'block';
        }
        
        document.getElementById('editModal').style.display = 'flex';
        // History API Added
        history.pushState({ view: 'edit' }, '', '');
    }

    function openAddModal() {
        // ফর্ম ক্লিয়ার করা
        document.getElementById('addForm').reset();
        
        // === FIX: Clone and replace file input to reset state (Chrome Fix) ===
        const oldInput = document.getElementById('addPhoto');
        const newInput = oldInput.cloneNode(true);
        oldInput.parentNode.replaceChild(newInput, oldInput);

        document.getElementById('previewAddPhoto').style.display = 'none';
        document.getElementById('previewAddPhoto').src = '';
        document.getElementById('uploadPlaceholderAdd').style.display = 'block';
        
        // মোডাল ওপেন করা
        document.getElementById('addModal').style.display = 'flex';
        // History API Added
        history.pushState({ view: 'add' }, '', '');
    }

    function closeModal(modalId) {
        document.getElementById(modalId).style.display = 'none';
    }

    function compressImage(file, maxSize, callback) {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = function(event) {
            const img = new Image();
            img.src = event.target.result;
            img.onload = function() {
                let width = img.width; let height = img.height;
                const size = Math.min(width, height);
                const sx = (width - size) / 2; const sy = (height - size) / 2;
                const canvas = document.createElement('canvas');
                canvas.width = maxSize; canvas.height = maxSize;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, sx, sy, size, size, 0, 0, maxSize, maxSize);
                callback(canvas.toDataURL('image/jpeg', 0.7));
            }
        }
    }

    async function submitEdit(e) {
        e.preventDefault();
        const submitBtn = document.querySelector('#editForm .btn-submit');
        submitBtn.disabled = true; submitBtn.textContent = 'প্রসেসিং হচ্ছে...';
        
        const newName = document.getElementById('editName').value;
        const newBpNo = document.getElementById('editNewBpNo').value;
        const newMobile = document.getElementById('editMobile').value;
        const newOffice = document.getElementById('editOffice').value;
        const bpNumber = document.getElementById('editBpNo').value;
        const fileInput = document.getElementById('editPhoto');
        let finalPhotoUrl = "";

        try {
            if (fileInput.files && fileInput.files[0]) {
                showToast('ছবি আপলোড হচ্ছে...');
                finalPhotoUrl = await uploadImageToDrive(fileInput.files[0]);
            }
            const payload = {
                action: 'updateRecord', bpNumber: bpNumber, newName: newName,
                newBpNo: newBpNo, newMobile: newMobile, newOffice: newOffice, newPhotoUrl: finalPhotoUrl
            };
            const response = await fetch(GAS_API_URL, { method: 'POST', body: JSON.stringify(payload) });
            const result = await response.json();
            if (result.status === 'success') {
                showToast('✅ তথ্য সফলভাবে সেভ হয়েছে।');
                closeModal('editModal');
                localStorage.removeItem('policeDirectoryCache'); initApp();
            } else { showToast('❌ এরর: ' + result.message); }
        } catch (error) { showToast('❌ নেটওয়ার্ক এরর। আবার চেষ্টা করুন।'); }
        finally { submitBtn.disabled = false; submitBtn.textContent = 'সাবমিট করুন'; }
    }

    async function uploadImageToDrive(file) {
        return new Promise((resolve, reject) => {
            compressImage(file, 800, async (base64String) => {
                try {
                    const response = await fetch(GAS_API_URL, {
                        method: 'POST', body: JSON.stringify({ action: 'uploadImage', imageBase64: base64String, fileName: file.name })
                    });
                    const result = await response.json();
                    if (result.status === 'success') resolve(result.url); else reject(result.message);
                } catch (err) { reject(err); }
            });
        });
    }

    function showToast(msg) {
        const x = document.getElementById("toast");
        x.textContent = msg; x.className = "show";
        setTimeout(() => { x.className = x.className.replace("show", ""); }, 3000);
    }

    window.onclick = function(event) {
        if (event.target == document.getElementById('editModal')) closeModal('editModal');
        if (event.target == document.getElementById('addModal')) closeModal('addModal');
    }

    // ==========================================
    //  NEW LOGIC: API HISTORY NAVIGATION (BACK BUTTON)
    // ==========================================

    window.addEventListener('popstate', function(event) {
        const editModal = document.getElementById('editModal');
        const addModal = document.getElementById('addModal');

        // ১. প্রথমে চেক করব কোনো মোডাল ওপেন আছে কিনা
        if (editModal.style.display === 'flex') {
            closeModal('editModal');
            return; // ফাংশন শেষ, পেজ ব্যাক হবে না
        }
        if (addModal.style.display === 'flex') {
            closeModal('addModal');
            return; // ফাংশন শেষ, পেজ ব্যাক হবে না
        }

        // ২. মোডাল বন্ধ থাকলে, চেক করব ফুল কার্ড (ডিটেইলস) ওপেন আছে কিনা
        const fullCardExists = document.querySelector('.full-card');
        if (fullCardExists) {
            // যদি ফুল কার্ড থাকে, তবে কমপ্যাক্ট ভিউতে ফিরে যাব
            renderData(allData, 'compact');
            return; 
        }

        // ৩. যদি মোডালও না থাকে এবং ফুল কার্ডও না থাকে (মানে হোম পেজে আছি), 
        // তবে কিছুই করব না, ব্রাউজার তার নিজস্ব ব্যাক বাটন একশন (পূর্ববর্তী সাইটে যাওয়া) করবে।
    });

        const submitBtn = document.querySelector('#addForm .btn-submit');
        submitBtn.disabled = true;

        const office = document.getElementById('addOffice').value;

            };

                body: JSON.stringify(payload)
            });

        } catch (error) {
            console.error(error);

        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = 'সদস্য যুক্ত করুন';
        }
    }
