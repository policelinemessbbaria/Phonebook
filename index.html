<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="theme-color" content="#006a4e">

<!-- ক্রপার লাইব্রেরি (Cropper.js) এর CSS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css" />

<!-- আপডেট করা সার্ভিস ওয়ার্কার কোড -->
<script>
  let refreshing = false;
  
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').then(reg => {
        console.log('Service Worker Registered!', reg);
        reg.addEventListener('updatefound', () => {
          const newWorker = reg.installing;
          newWorker.addEventListener('statechange', () => {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              showToast('নতুন আপডেট পাওয়া গেছে! আপডেট হচ্ছে...');
              newWorker.postMessage({ type: 'SKIP_WAITING' });
            }
          });
        });
      });

      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (refreshing) return; 
        refreshing = true;
        window.location.reload(); 
      });
    });
  }

  navigator.serviceWorker.addEventListener('message', (event) => {
    if (event.data && event.data.type === 'SKIP_WAITING') {
        self.skipWaiting();
    }
  });
</script>

    <style>
        :root {
            --primary-color: #006a4e;
            --secondary-color: #f42a41;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333333;
            --label-color: #666;
        }
        body {
            font-family: 'SolaimanLipi', 'Kalpurush', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            color: var(--text-color);
            -webkit-font-smoothing: antialiased;
        }
        header {
            background-color: var(--primary-color);
            color: white;
            padding: 10px 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 800px;
            margin: 0 auto;
        }
        .header-title {
            text-align: left;
        }
        header h1 { margin: 0; font-size: 1.3rem; line-height: 1.2; }
        header p { margin: 3px 0 0 0; font-size: 0.85rem; opacity: 0.9; }
        
        .btn-add-header {
            background-color: white;
            color: var(--primary-color);
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;

            box-shadow: 0 2px 5px rgba(0,0,0,0.2);

            background-color: #f0fdf4;

            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            text-align: center;
        }
        .filter-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 15px;
            justify-content: center;
        }
        .filter-row .form-group {
            flex: 1;
            min-width: 140px;
            max-width: 250px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 10px;
            text-align: left;
        }
        .form-group label {
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 0.9rem;
        }
        input, select {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
            font-family: inherit;
        }
        .input-group { display: flex; justify-content: center; }
        #searchInput { border-radius: 5px 0 0 5px; text-align: center; }
        .btn-search {

            color: white;
            border: 1px solid var(--primary-color);
            padding: 0 20px;
            border-radius: 0 5px 5px 0;
            cursor: pointer;
            font-size: 1.2rem;
        }
        .btn-search:hover { background-color: #00503a; }

        /* === ১. কমপ্যাক্ট ভিউ (হোম পেজ) === */
        .compact-card {
            background: var(--card-bg);
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s;
            border-radius: 8px;
            margin-bottom: 8px;
            border: 1px solid transparent;
        }
        .compact-card:hover { 
            background-color: #f0fdf4; 
            border-color: #c8e6c9;
        }
        
        .compact-left { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            flex-wrap: wrap;
        }
        .compact-brush { 
            font-weight: bold; 
            color: var(--primary-color); 
            font-size: 0.85rem; 
            background: #e8f5e9;
            padding: 2px 6px;
            border-radius: 4px;
        }
        .compact-rank {
            font-size: 0.8rem;
            background: #e3f2fd;
            color: #1565c0;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
        }
        .compact-name { 
            font-size: 1rem; 
            color: #333; 
            font-weight: 600;
        }
        
        /* === ২. ফুল কার্ড ভিউ (সার্চ রেজাল্ট) === */
        .full-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            text-align: center;
            border-top: 5px solid var(--primary-color);
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .profile-pic-container {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid #eee;
            background-color: #f0f0f0;
            margin: 0 auto 15px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .profile-pic {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .rank-badge {
            display: inline-block;
            background: #e9ecef;
            color: #555;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .user-name {
            font-size: 1.5rem;
            font-weight: bold;
            margin: 5px 0 15px 0;
            color: var(--primary-color);
        }
        .office-badge {
            background-color: #e3f2fd;
            color: #0d47a1;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 0.95rem;
            display: inline-block;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
            background: #fafafa;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #eee;
        }
        .info-item { text-align: left; font-size: 0.95rem; }
        .info-label { color: var(--label-color); font-size: 0.8rem; display: block; margin-bottom: 2px; }
        .info-value { font-weight: 600; color: #000; font-size: 1rem; }

        .action-section {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .btn-action {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 8px 18px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
            border: 1px solid #c8e6c9;
            transition: all 0.2s;
        }
        .btn-action:hover { background: #c8e6c9; transform: translateY(-2px); }
        
        .btn-whatsapp {
            background: #dcf8c6;
            color: #075e54;
            border: 1px solid #a5d6a7;
        }
        .btn-whatsapp:hover { background: #c5e1a5; }

        .btn-edit {
            background-color: var(--secondary-color);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            margin-top: 15px;
            width: 100%;
            max-width: 220px;
            box-shadow: 0 4px 6px rgba(244, 42, 65, 0.3);
            transition: background 0.3s;
        }
        .btn-edit:hover { background-color: #d61e33; }
        
        .btn-back {
            background: #fff;
            color: #555;
            padding: 6px 15px;
            border-radius: 15px;
            text-decoration: none;
            font-size: 0.85rem;
            display: inline-block;
            margin-bottom: 10px;
            border: 1px solid #ddd;
        }
        .btn-back:hover { background: #f5f5f5; }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(3px);
        }
        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 15px;
            width: 95%;
            max-width: 480px;
            max-height: 90vh;
            overflow-y: auto;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            animation: slideUp 0.3s ease-out;
            position: relative;
        }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .close-btn { 
            float: right; font-size: 1.8rem; cursor: pointer; background: none; border: none; color: #999; line-height: 1;
        }
        .close-btn:hover { color: #333; }
        
        /* Image Upload Area */
        .image-upload-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px dashed #bbb;
            padding: 15px;
            text-align: center;
            border-radius: 8px;
            margin-bottom: 15px;
            cursor: pointer;
            height: 160px;
            overflow: hidden;
            position: relative;
            background: #fafafa;
            transition: border 0.2s;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .image-upload-area:hover { border-color: var(--primary-color); background: #f0fdf4; }
        
        .preview-img {
            width: 100%; height: 100%; object-fit: contain; position: absolute; top:0; left:0; display: none;
            z-index: 2;
            pointer-events: none;
        }
        .btn-submit {
            background: var(--primary-color); color: white; border: none;
            padding: 12px 20px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 10px;
            font-size: 1rem; font-weight: bold;
        }
        .btn-submit.add { background-color: #2e7d32; }
        
        .btn-cancel {
            background: #e0e0e0; border: none; padding: 12px 20px;
            border-radius: 8px; cursor: pointer; width: 100%; margin-top: 8px; font-weight: 600; color: #333;
        }
        
        /* Toast Notification */
        #toast {
            visibility: hidden; min-width: 280px; background-color: #333; color: #fff;
            text-align: center; border-radius: 50px; padding: 14px; position: fixed;
            z-index: 2000; left: 50%; bottom: 30px; transform: translateX(-50%);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); font-weight: 500;
        }
        #toast.show { visibility: visible; animation: fadein 0.4s, fadeout 0.4s 2.6s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }

        /* Loader */
        .loader-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* === CROP MODAL SPECIFIC STYLES === */
        #cropModal .modal-content {
            max-width: 600px; /* Crop modal needs to be wider */
            padding: 15px;
        }
        .crop-container {
            height: 400px;
            background-color: #333;
            margin-bottom: 15px;
            border-radius: 4px;
            overflow: hidden;
        }
        #imageToCrop {
            display: block;
            max-width: 100%;
        }
        .crop-actions {
            display: flex;
            gap: 10px;
        }
        .crop-actions button {
            flex: 1;
        }
    </style>
</head>
<body>

<header>
    <div class="header-content">
        <div class="header-title">
            <h1>জেলা পুলিশ, ব্রাহ্মণবাড়িয়া</h1>
            <p>ডিজিটাল ফোনবুক</p>
        </div>
        <button class="btn-add-header" onclick="openAddModal()">+ নতুন সদস্য</button>
    </div>
</header>

<main class="container">
    <div class="search-box">
        <div class="filter-row">
            <div class="form-group">
                <label for="rankFilter">পদবী</label>
                <select id="rankFilter" onchange="filterData()">
                    <option value="">সকল পদবী</option>
                </select>
            </div>
            <div class="form-group">
                <label for="officeFilter">কর্মরত/অফিস</label>
                <select id="officeFilter" onchange="filterData()">
                    <option value="">সকল অফিস</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>ব্রাশ/নাম/বিপি নাম্বার দিয়ে অনুসন্ধান করুন</label>
            <div class="input-group">
                <input type="text" id="searchInput" placeholder="যেমন:১০১৪/সুজন/৯৯১৮২১৫৮০৫...">
                <button class="btn-search" onclick="filterData()">🔍</button>
            </div>
        </div>
    </div>
    
    <!-- লোডার -->
    <div id="loader" style="display:none;">
        <div class="loader-spinner"></div>
        <p style="text-align:center; color:#666;">ডেটা লোড হচ্ছে...</p>
    </div>
    
    <!-- রেজাল্ট এরিয়া -->
    <div id="result-area"></div>
</main>

<!-- Edit Modal -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <div style="overflow:hidden;">
            <button class="close-btn" onclick="closeModal('editModal')">&times;</button>
            <h3 style="margin-bottom: 20px; color: var(--primary-color);">তথ্য হালনাগাদ করুন</h3>
        </div>
        <form id="editForm" onsubmit="submitEdit(event)">
            <input type="hidden" id="editBpNo">
            
            <div style="display: flex; gap: 10px;">
                <div class="form-group" style="flex:1">
                    <label>র‍্যাঙ্ক</label>
                    <input type="text" id="displayRank" disabled style="background:#eee; color:#555;">
                </div>
                <div class="form-group" style="flex:1">
                    <label>ব্রাশ নং</label>
                    <input type="text" id="displayBrushNo" disabled style="background:#eee; color:#555;">
                </div>
            </div>

            <div class="form-group">
                <label>প্রোফাইল ছবি (১:১ রেশিও)</label>
                <label class="image-upload-area" for="editPhoto">
                    <span id="uploadPlaceholderEdit" style="font-size: 2rem; pointer-events: none;">📷<br><span style="font-size:0.9rem; color:#666;">ছবি সিলেক্ট করুন</span></span>
                    <img id="previewEditPhoto" class="preview-img">
                    <!-- ফাইল ইনপুট চেঞ্জ ইভেন্টে আমরা ক্রপিং কল করবো -->
                    <input type="file" id="editPhoto" accept="image/*" style="display:none;" onchange="handleFileSelect(this, 'edit')">
                </label>
            </div>

            <div class="form-group">
                <label>নাম (Name)</label>
                <input type="text" id="editName" required>
            </div>
            <div class="form-group">
                <label>বিপি নাম্বার (BP Number)</label>
                <input type="text" id="editNewBpNo" required>
            </div>
            <div class="form-group">
                <label>মোবাইল নাম্বার</label>
                <input type="tel" id="editMobile" required>
            </div>
            <div class="form-group">
                <label>কর্মরত (Office/Unit)</label>
                <input type="text" id="editOffice" required placeholder="যেমন: SAF রেগুলার/ D- স্টো/মেজর অফিস/ মেস...">
            </div>

            <button type="button" class="btn-cancel" onclick="closeModal('editModal')">বাতিল</button>
            <button type="submit" class="btn-submit">সাবমিট করুন</button>
        </form>
    </div>
</div>

<!-- Add Member Modal -->
<div id="addModal" class="modal">
    <div class="modal-content">
        <div style="overflow:hidden;">
            <button class="close-btn" onclick="closeModal('addModal')">&times;</button>
            <h3 style="margin-bottom: 20px; color: #2e7d32;">নতুন সদস্য যুক্ত করুন</h3>
        </div>
        <form id="addForm" onsubmit="submitAdd(event)">
            
            <div style="display: flex; gap: 10px;">
                <div class="form-group" style="flex:1">
                    <label>র‍্যাঙ্ক</label>
                    <select id="addRank" required>
                        <option value="" disabled selected>পদবী নির্বাচন করুন</option>
                    </select>
                </div>
                <div class="form-group" style="flex:1">
                    <label>ব্রাশ নং</label>
                    <input type="text" id="addBrushNo" required placeholder="যেমন: 1014 বা ১০১৪">
                </div>
            </div>

            <div class="form-group">
                <label>প্রোফাইল ছবি</label>
                <label class="image-upload-area" for="addPhoto">
                    <span id="uploadPlaceholderAdd" style="font-size: 2rem; pointer-events: none;">📷<br><span style="font-size:0.9rem; color:#666;">ছবি সিলেক্ট করুন</span></span>
                    <img id="previewAddPhoto" class="preview-img">
                    <input type="file" id="addPhoto" accept="image/*" style="display:none;" onchange="handleFileSelect(this, 'add')">
                </label>
            </div>

            <div class="form-group">
                <label>নাম (Name)</label>
                <input type="text" id="addName" required>
            </div>
            <div class="form-group">
                <label>বিপি নাম্বার (BP Number)</label>
                <input type="text" id="addBpNo" required>
            </div>
            <div class="form-group">
                <label>মোবাইল নাম্বার</label>
                <input type="tel" id="addMobile" required>
            </div>
            <div class="form-group">
                <label>কর্মরত (Office/Unit)</label>
                <input type="text" id="addOffice" required placeholder="যেমন: SAF রেগুলার/ D- স্টো/মেজর অফিস/ মেস...">
            </div>

            <button type="button" class="btn-cancel" onclick="closeModal('addModal')">বাতিল</button>
            <button type="submit" class="btn-submit add">সদস্য যুক্ত করুন</button>
        </form>
    </div>
</div>

<!-- === NEW: CROP MODAL === -->
<div id="cropModal" class="modal">
    <div class="modal-content">
        <div style="overflow:hidden;">
            <button class="close-btn" onclick="closeCropModal()">&times;</button>
            <h3>ছবি ক্রপ করুন (Square)</h3>
        </div>
        <div class="crop-container">
            <img id="imageToCrop" src="" alt="Crop Image">
        </div>
        <div class="crop-actions">
            <button type="button" class="btn-cancel" onclick="closeCropModal()">বাতিল</button>
            <button type="button" class="btn-submit" onclick="confirmCrop()">✅ ক্রপ সিলেক্ট করুন</button>
        </div>
    </div>
</div>

<div id="toast">মেসেজ</div>

<!-- ক্রপার লাইব্রেরি (Cropper.js) এর JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>

    const bn2enMap = {
        '০': '0', '১': '1', '২': '2', '৩': '3', '৪': '4',
        '৫': '5', '৬': '6', '৭': '7', '৮': '8', '৯': '9'
    };

    function convertBnToEn(str) {
        if (!str) return '';
        return str.toString().replace(/[০-৯]/g, m => bn2enMap[m]);
    }

    // ==========================================
    // CROPPER LOGIC (NEW)
    // ==========================================
    let cropper;
    let currentCropMode = ''; // 'edit' or 'add'
    let croppedImages = {
        edit: null,
        add: null
    };

    function handleFileSelect(input, mode) {
        if (input.files && input.files[0]) {
            const file = input.files[0];
            const reader = new FileReader();
            
            reader.onload = function(e) {
                // ক্রপ মোডালে ইমেজ সেট করা
                const imageToCrop = document.getElementById('imageToCrop');
                imageToCrop.src = e.target.result;
                
                // মোড সেভ করা (Edit নাকি Add?)
                currentCropMode = mode;
                
                // ক্রপ মোডাল ওপেন করা
                document.getElementById('cropModal').style.display = 'flex';
                
                // আগের ক্রপার ডেস্ট্রয় করা যদি থাকে
                if (cropper) {
                    cropper.destroy();
                }

                // ক্রপার ইনিশিয়ালাইজ করা
                cropper = new Cropper(imageToCrop, {
                    aspectRatio: 1, // 1:1 (Square)
                    viewMode: 1,    // ছবি ক্রপ বক্সের বাইরে যাবে না
                    dragMode: 'move',
                    autoCropArea: 0.8,
                    restore: false,
                    guides: true,
                    center: true,
                    highlight: false,
                    cropBoxMovable: true,
                    cropBoxResizable: true,
                    toggleDragModeOnDblclick: false,
                });
            }
            
            reader.readAsDataURL(file);
        }
    }

    function confirmCrop() {
        if (!cropper) return;

        // ক্রপ করা ক্যানভাস বের করা
        const canvas = cropper.getCroppedCanvas({
            width: 800, // আউটপুট সাইজ (High Quality)
            height: 800,
            minWidth: 256,
            minHeight: 256,
            maxWidth: 4096,
            maxHeight: 4096,
            fillColor: '#fff',
            imageSmoothingEnabled: true,
            imageSmoothingQuality: 'high',
        });

        // বেস ৬৪ স্ট্রিং-এ কনভার্ট করা
        const croppedDataUrl = canvas.toDataURL('image/jpeg', 0.9);
        
        // গ্লোবাল ভেরিয়েবলে সেভ করা
        croppedImages[currentCropMode] = croppedDataUrl;

        // ফর্ম প্রিভিউ আপডেট করা
        if (currentCropMode === 'edit') {
            const imgPreview = document.getElementById('previewEditPhoto');
            const placeholder = document.getElementById('uploadPlaceholderEdit');
            imgPreview.src = croppedDataUrl;
            imgPreview.style.display = 'block';
            placeholder.style.display = 'none';
        } else if (currentCropMode === 'add') {
            const imgPreview = document.getElementById('previewAddPhoto');
            const placeholder = document.getElementById('uploadPlaceholderAdd');
            imgPreview.src = croppedDataUrl;
            imgPreview.style.display = 'block';
            placeholder.style.display = 'none';
        }

        // ক্রপ মোডাল বন্ধ করা
        closeCropModal();
    }

    function closeCropModal() {
        document.getElementById('cropModal').style.display = 'none';
        if (cropper) {
            cropper.destroy();
            cropper = null;
        }
        // ইউজার যদি ক্রপ বাতিল করে, তাহলে ফাইল ইনপুট ক্লিয়ার করে দেওয়া উচিত
        // যাতে ফাইল আপলোড না হয়
        if(!croppedImages[currentCropMode]) {
            const inputId = currentCropMode === 'edit' ? 'editPhoto' : 'addPhoto';
            document.getElementById(inputId).value = '';
        }
    }

    // ==========================================
    //  MAIN APP LOGIC
    // ==========================================

    window.addEventListener('DOMContentLoaded', () => {
        initApp();
    });

    document.getElementById("searchInput").addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            event.preventDefault();
            filterData();
        }
    });

    function scrollToElement(elementId) {
        const element = document.getElementById(elementId);
        const header = document.querySelector('header');
        if(element && header){
            const headerOffset = header.offsetHeight + 15;
            const elementPosition = element.getBoundingClientRect().top;
            const offsetPosition = elementPosition + window.pageYOffset - headerOffset;
            window.scrollTo({ top: offsetPosition, behavior: "smooth" });
        }
    }

    function showUserDetails(bpNo) {
        const user = allData.find(u => u.bpNo === bpNo);
        if (user) {
            renderData([user], 'full');
            scrollToElement('result-area');
            history.pushState({ view: 'detail' }, '', '');
        }
    }

    async function initApp() {
        const loader = document.getElementById('loader');
        loader.style.display = 'block';
        
        const cachedRaw = localStorage.getItem('policeDirectoryCache');
        let cachedData = null;
        let localVersion = 0;

        if (cachedRaw) {
            try {
                const parsed = JSON.parse(cachedRaw);
                cachedData = parsed.data;
                localVersion = parsed.lastUpdated || 0;
                
                if (cachedData && cachedData.length > 0) {
                    allData = cachedData;
                    populateFilters(allData);
                    renderData(allData, 'compact');
                    loader.style.display = 'none';
                }
            } catch (e) { console.error("Cache parse error:", e); }
        }

        try {
            const response = await fetch(GAS_API_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'getAllData' })
            });
            const result = await response.json();

            if (result.status === 'success') {
                const serverVersion = result.lastUpdated || 0;
                if (serverVersion > localVersion) {
                    allData = result.data;
                    const dataToStore = { data: allData, lastUpdated: serverVersion };
                    localStorage.setItem('policeDirectoryCache', JSON.stringify(dataToStore));
                    populateFilters(allData);
                    renderData(allData, 'compact');
                    if(serverVersion > localVersion && localVersion !== 0) showToast('ডাটা আপডেট হয়েছে।');
                }
            }
        } catch (error) {
            console.error("Fetch error:", error);
            if(!cachedData) showToast('সার্ভার কানেকশন এরর। ইন্টারনেট চেক করুন।');
        } finally {
            loader.style.display = 'none';
        }
    }

    function populateFilters(data) {
        const uniqueRanks = new Set();
        const orderedRanks = [];

        for (const item of data) {
            const rank = item.rank;
            if (rank && !uniqueRanks.has(rank)) {
                uniqueRanks.add(rank);
                orderedRanks.push(rank);
            }
        }

        const offices = new Set(data.map(item => item.office).filter(o => o));
        const sortedOffices = Array.from(offices).sort();

        const rankSelect = document.getElementById('rankFilter');
        if (rankSelect.options.length <= 1) {
            orderedRanks.forEach(rank => {
                const option = document.createElement('option');
                option.value = rank;
                option.textContent = rank;
                rankSelect.appendChild(option);
            });
        }

        const officeSelect = document.getElementById('officeFilter');
        if (officeSelect.options.length <= 1) {
            sortedOffices.forEach(office => {
                const option = document.createElement('option');
                option.value = office;
                option.textContent = office;
                officeSelect.appendChild(option);
            });
        }

        const addRankSelect = document.getElementById('addRank');
        addRankSelect.innerHTML = '<option value="" disabled selected>পদবী নির্বাচন করুন</option>';
        
        orderedRanks.forEach(rank => {
            const option = document.createElement('option');
            option.value = rank;
            option.textContent = rank;
            addRankSelect.appendChild(option);
        });
    }

    function renderData(data, viewType) {
        const container = document.getElementById('result-area');
        container.innerHTML = '';
        if (data.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:40px; color:#888;">⚠️ কোনো তথ্য পাওয়া যায়নি।</div>';
            return;
        }

        data.forEach((user) => {
            const mobileEn = convertBnToEn(user.mobile);
            
            let waNum = mobileEn.replace(/\D/g, ''); 
            if (waNum.startsWith('0')) {
                waNum = '880' + waNum.substring(1);
            } else if (!waNum.startsWith('88')) {
                waNum = '880' + waNum;
            }
            const whatsappLink = `https://wa.me/${waNum}`;
            
            const userImg = user.photo ? user.photo : 'https://ui-avatars.com/api/?name=' + encodeURIComponent(user.name) + '&background=random';
            
            const card = document.createElement('div');

            if (viewType === 'full') {
                card.className = 'full-card';
                card.innerHTML = `
                    <div style="margin-bottom:10px; text-align: left;">
                        <a href="#" onclick="renderData(allData, 'compact'); return false;" class="btn-back">⬅ তালিকায় ফিরে যান</a>
                    </div>
                    <div class="profile-pic-container">
                        <img src="${userImg}" class="profile-pic" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(user.name)}&background=random'" alt="Profile">
                    </div>
                    <span class="rank-badge">${user.rank}</span>
                    <h3 class="user-name">${user.name}</h3>
                    ${user.office ? `<div class="office-badge">${user.office}</div>` : ''}
                    
                    <div class="info-grid">
                        <div class="info-item"><span class="info-label">ব্রাশ নং</span><span class="info-value">${user.brushNo}</span></div>
                        <div class="info-item"><span class="info-label">বিপি নং</span><span class="info-value">${user.bpNo}</span></div>
                        <div class="info-item" style="grid-column: span 2;"><span class="info-label">মোবাইল</span><span class="info-value" style="direction: ltr;">${mobileEn}</span></div>
                    </div>

                    <div class="action-section">
                        <a href="tel:${mobileEn}" class="btn-action">📞 কল করুন</a>
                        <a href="${whatsappLink}" target="_blank" class="btn-action btn-whatsapp">💬 হোয়াটসঅ্যাপ</a>
                        <button onclick="copyToClipboard('${mobileEn}')" class="btn-action">📋 নম্বর কপি</button>
                    </div>
                    
                    <button class="btn-edit" onclick="openEditModal('${user.bpNo}', '${user.rank}', '${user.brushNo}', '${user.name}', '${user.bpNo}', '${user.mobile}', '${user.office || ''}', '${user.photo || ''}')">
                        ✏️ এডিট করুন
                    </button>
                `;
            } else {
                card.className = 'compact-card';
                card.onclick = () => showUserDetails(user.bpNo);
                card.innerHTML = `
                    <div class="compact-left">
                        <span class="compact-brush">${user.brushNo}</span>
                        <span class="compact-rank">${user.rank}</span>
                        <span class="compact-name">${user.name}</span>
                    </div>
                    <div style="color:var(--primary-color);">➤</div>
                `;
            }
            container.appendChild(card);
        });
    }

    function filterData() {
        const searchInput = document.getElementById('searchInput');
        const rankFilter = document.getElementById('rankFilter');
        const officeFilter = document.getElementById('officeFilter');
        
        const query = searchInput.value.trim();
        const queryEn = convertBnToEn(query);
        const rank = rankFilter.value;
        const office = officeFilter.value;

        const filtered = allData.filter(user => {
            const matchRank = rank === '' || user.rank === rank;
            const matchOffice = office === '' || user.office === office;
            let matchSearch = false;
            if (query === '') { matchSearch = true; } else {
                const brushEn = convertBnToEn(user.brushNo);
                const bpEn = convertBnToEn(user.bpNo);
                const nameEn = user.name.toLowerCase();
                const queryLower = query.toLowerCase();
                if (brushEn.includes(queryEn) || bpEn.includes(queryEn) || nameEn.includes(queryLower)) { matchSearch = true; }
            }
            return matchRank && matchOffice && matchSearch;
        });
        
        const isActiveSearch = (query !== '' || rank !== '' || office !== '');
        if (isActiveSearch) { 
            renderData(filtered, 'full'); 
            scrollToElement('result-area');
            history.pushState({ view: 'search' }, '', '');
        } else { 
            renderData(filtered, 'compact'); 
        }
    }

    function copyToClipboard(text) {
        navigator.clipboard.writeText(text).then(() => showToast('নাম্বার কপি হয়েছে!')).catch(() => showToast('কপি করতে ব্যর্থ হয়েছে।'));
    }

    // ==========================================
    //  EDIT & ADD MODAL LOGIC
    // ==========================================

    // Old previewImage function is replaced by handleFileSelect for upload triggering
    // But we might still need to manually set preview if loading existing data
    function setExistingPreview(imgId, placeholderId, src) {
        const img = document.getElementById(imgId);
        if (src) {
            img.src = src;
            img.style.display = 'block';
            document.getElementById(placeholderId).style.display = 'none';
        } else {
            img.style.display = 'none'; img.src = ''; document.getElementById(placeholderId).style.display = 'block';
        }
    }

    function openEditModal(bpNo, rank, brushNo, name, bp, mobile, office, photo) {
        document.getElementById('editBpNo').value = bpNo;
        document.getElementById('displayRank').value = rank;
        document.getElementById('displayBrushNo').value = brushNo;
        document.getElementById('editName').value = name;
        document.getElementById('editNewBpNo').value = bp;
        document.getElementById('editMobile').value = mobile;
        document.getElementById('editOffice').value = office;
        
        // Reset file input and cropped data
        croppedImages.edit = null;
        const oldInput = document.getElementById('editPhoto');
        const newInput = oldInput.cloneNode(true);
        oldInput.parentNode.replaceChild(newInput, oldInput);
        
        setExistingPreview('previewEditPhoto', 'uploadPlaceholderEdit', photo);
        
        document.getElementById('editModal').style.display = 'flex';
        history.pushState({ view: 'edit' }, '', '');
    }

    function openAddModal() {
        document.getElementById('addForm').reset();
        
        croppedImages.add = null;
        const oldInput = document.getElementById('addPhoto');
        const newInput = oldInput.cloneNode(true);
        oldInput.parentNode.replaceChild(newInput, oldInput);

        setExistingPreview('previewAddPhoto', 'uploadPlaceholderAdd', null);
        
        document.getElementById('addModal').style.display = 'flex';
        history.pushState({ view: 'add' }, '', '');
    }

    function closeModal(modalId) {
        document.getElementById(modalId).style.display = 'none';
    }

    // compressImage is no longer needed strictly if we use Cropper output, 
    // but kept if user sends file directly without cropping (though logic prevents that now).
    // We will rely on the cropped Base64 string directly.
    
    async function submitEdit(e) {
        e.preventDefault();
        const submitBtn = document.querySelector('#editForm .btn-submit');
        submitBtn.disabled = true; submitBtn.textContent = 'প্রসেসিং হচ্ছে...';
        
        const newName = document.getElementById('editName').value;
        const newBpNo = document.getElementById('editNewBpNo').value;
        const newMobile = document.getElementById('editMobile').value;
        const newOffice = document.getElementById('editOffice').value;
        const bpNumber = document.getElementById('editBpNo').value;
        
        let finalPhotoUrl = "";

        try {
            // চেক করব ক্রপ করা ছবি আছে কিনা
            if (croppedImages.edit) {
                showToast('ছবি আপলোড হচ্ছে...');
                // ক্রপ করা ছবি সরাসরি আপলোড ফাংশনে পাঠানো হচ্ছে (Base64)
                finalPhotoUrl = await uploadBase64ToDrive(croppedImages.edit, "profile_edit.jpg");
            } else {
                // যদি নতুন ছবি না দেয়, তবে পুরনো ছবি থাকলে সেটা রাখা হবে (লজিক অনুযায়ী আপডেটে ফটো অপশনাল)
                // যদিও GAS স্ক্রিপ্ট লজিক অনুযায়ী নতুন URL না পাঠালে পুরনোটা থাকে কিনা তা ডিপেন্ড করে।
                // আমরা এখানে কেবল নতুন ছবি আপলোড করছি যদি ক্রপ করা থাকে।
            }

            const payload = {
                action: 'updateRecord', bpNumber: bpNumber, newName: newName,
                newBpNo: newBpNo, newMobile: newMobile, newOffice: newOffice, newPhotoUrl: finalPhotoUrl
            };
            
            const response = await fetch(GAS_API_URL, { method: 'POST', body: JSON.stringify(payload) });
            const result = await response.json();
            if (result.status === 'success') {
                showToast('✅ তথ্য সফলভাবে সেভ হয়েছে।');
                closeModal('editModal');
                localStorage.removeItem('policeDirectoryCache'); initApp();
            } else { showToast('❌ এরর: ' + result.message); }
        } catch (error) { showToast('❌ নেটওয়ার্ক এরর। আবার চেষ্টা করুন।'); }
        finally { submitBtn.disabled = false; submitBtn.textContent = 'সাবমিট করুন'; }
    }

    // Base64 ডিরেক্টলি আপলোড করার ফাংশন (ক্রপ করা ছবির জন্য)
    async function uploadBase64ToDrive(base64Data, fileName) {
        try {
            const response = await fetch(GAS_API_URL, {
                method: 'POST', 
                body: JSON.stringify({ 
                    action: 'uploadImage', 
                    imageBase64: base64Data, 
                    fileName: fileName 
                })
            });
            const result = await response.json();
            if (result.status === 'success') return result.url;
            else throw new Error(result.message);
        } catch (err) { 
            throw err; 
        }
    }

    // Legacy compressImage function not strictly needed for cropped images, 
    // but kept if we want to support non-cropped flow in future.
    // Currently, handleFileSelect forces cropping.

    async function submitAdd(e) {
        e.preventDefault();
        
        const submitBtn = document.querySelector('#addForm .btn-submit');
        submitBtn.disabled = true;
        submitBtn.textContent = 'প্রসেসিং হচ্ছে...';

        const rank = document.getElementById('addRank').value;
        const brushNo = document.getElementById('addBrushNo').value;
        const name = document.getElementById('addName').value;
        const bpNo = document.getElementById('addBpNo').value;
        const mobile = document.getElementById('addMobile').value;
        const office = document.getElementById('addOffice').value;

        let finalPhotoUrl = "";

        try {
            if (croppedImages.add) {
                showToast('ছবি আপলোড হচ্ছে...');
                finalPhotoUrl = await uploadBase64ToDrive(croppedImages.add, "profile_new.jpg");
            }

            const payload = {
                action: 'createRecord',
                rank: rank,
                brushNo: brushNo,
                name: name,
                bpNo: bpNo,
                mobile: mobile,
                office: office,
                photoUrl: finalPhotoUrl
            };

            const response = await fetch(GAS_API_URL, {
                method: 'POST',
                body: JSON.stringify(payload)
            });
            
            const result = await response.json();
            
            if (result.status === 'success') {
                showToast('✅ নতুন সদস্য সফলভাবে যুক্ত হয়েছে।');
                closeModal('addModal');
                localStorage.removeItem('policeDirectoryCache'); 
                initApp(); 
            } else {
                showToast('❌ এরর: ' + result.message);
            }

        } catch (error) {
            console.error(error);
            showToast('❌ নেটওয়ার্ক এরর। আবার চেষ্টা করুন।');
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = 'সদস্য যুক্ত করুন';
        }
    }

    function showToast(msg) {
        const x = document.getElementById("toast");
        x.textContent = msg; x.className = "show";
        setTimeout(() => { x.className = x.className.replace("show", ""); }, 3000);
    }

    window.onclick = function(event) {
        if (event.target == document.getElementById('editModal')) closeModal('editModal');
        if (event.target == document.getElementById('addModal')) closeModal('addModal');
        if (event.target == document.getElementById('cropModal')) closeCropModal();
    }

    window.addEventListener('popstate', function(event) {
        const editModal = document.getElementById('editModal');
        const addModal = document.getElementById('addModal');
        const cropModal = document.getElementById('cropModal');

        if (cropModal.style.display === 'flex') {
            closeCropModal();
            return; 
        }
        if (editModal.style.display === 'flex') {
            closeModal('editModal');
            return; 
        }
        if (addModal.style.display === 'flex') {
            closeModal('addModal');
            return; 
        }

        const fullCardExists = document.querySelector('.full-card');
        if (fullCardExists) {
            renderData(allData, 'compact');
            return; 
        }
    });

</script>
