<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>পুলিশ ইউনিট ডিরেক্টরি</title>
    <style>
        :root {
            --primary-color: #006a4e;
            --secondary-color: #f42a41;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333333;
            --label-color: #666;
        }
        body {
            font-family: 'SolaimanLipi', 'Kalpurush', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            color: var(--text-color);
        }
        header {
            background-color: var(--primary-color);
            color: white;
            padding: 15px 20px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 0 15px;
        }
        
        /* সার্চ এবং ফিল্টার এরিয়া */
        .search-box {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            text-align: center;
        }
        .filter-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 15px;
            justify-content: center;
        }
        .filter-row .form-group {
            flex: 1;
            min-width: 140px;
            max-width: 250px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 10px;
            text-align: left;
        }
        .form-group label {
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 0.9rem;
        }
        input, select {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
        }
        .input-group { display: flex; justify-content: center; }
        #searchInput { border-radius: 5px 0 0 5px; text-align: center; }
        .btn-search {
            background-color: var(--primary-color);
            color: white;
            border: 1px solid var(--primary-color);
            padding: 0 20px;
            border-radius: 0 5px 5px 0;
            cursor: pointer;
        }

        /* === ১. কমপ্যাক্ট ভিউ (হোম পেজ) === */
        .compact-card {
            background: var(--card-bg);
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: default;
        }
        .compact-left { text-align: left; }
        .compact-brush { font-weight: bold; color: var(--primary-color); font-size: 0.9rem; }
        .compact-name { font-size: 1rem; color: #333; }
        
        /* === ২. ফুল কার্ড ভিউ (সার্চ রেজাল্ট) === */
        .full-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            text-align: center;
            border-top: 5px solid var(--primary-color);
            animation: fadeIn 0.5s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .profile-pic-container {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid #eee;
            background-color: #f0f0f0;
            margin: 0 auto 15px auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .profile-pic {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .rank-badge {
            display: inline-block;
            background: #e9ecef;
            color: #555;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .user-name {
            font-size: 1.4rem;
            font-weight: bold;
            margin: 5px 0 15px 0;
            color: var(--primary-color);
        }
        .office-badge {
            background-color: #e3f2fd;
            color: #0d47a1;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.9rem;
            display: inline-block;
            margin-bottom: 15px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
            background: #fafafa;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #eee;
        }
        .info-item { text-align: left; font-size: 0.95rem; }
        .info-label { color: var(--label-color); font-size: 0.85rem; display: block; margin-bottom: 2px; }
        .info-value { font-weight: 500; color: #000; }

        .action-section {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .btn-action {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 8px 15px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
            border: 1px solid #c8e6c9;
        }
        .btn-edit {
            background-color: var(--secondary-color);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: bold;
            margin-top: 10px;
            width: 100%;
            max-width: 200px;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 10px;
            width: 90%;
            max-width: 450px;
            max-height: 90vh;
            overflow-y: auto;
            text-align: center;
        }
        .close-btn { float: right; font-size: 1.5rem; cursor: pointer; background: none; border: none; }
        
        .image-upload-area {
            border: 2px dashed #ccc;
            padding: 10px;
            text-align: center;
            border-radius: 5px;
            margin-bottom: 10px;
            cursor: pointer;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .preview-img {
            width: 100%; height: 100%; object-fit: contain; position: absolute; display: none;
        }
        .btn-submit {
            background: var(--primary-color); color: white; border: none;
            padding: 10px 20px; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 10px;
        }
        .btn-cancel {
            background: #ccc; border: none; padding: 10px 20px;
            border-radius: 5px; cursor: pointer; width: 100%; margin-top: 5px;
        }
        #toast {
            visibility: hidden; min-width: 250px; background-color: #333; color: #fff;
            text-align: center; border-radius: 5px; padding: 16px; position: fixed;
            z-index: 1001; left: 50%; bottom: 30px; transform: translateX(-50%);
        }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body>

<header>
    <h1>বাংলাদেশ পুলিশ</h1>
    <p>ইউনিট ডিরেক্টরি ও তথ্য হালনাগাদ</p>
</header>

<main class="container">
    <div class="search-box">
        <div class="filter-row">
            <div class="form-group">
                <label for="rankFilter">পদবী</label>
                <select id="rankFilter" onchange="filterData()">
                    <option value="">সকল পদবী</option>
                </select>
            </div>
            <div class="form-group">
                <label for="officeFilter">কর্মরত/অফিস</label>
                <select id="officeFilter" onchange="filterData()">
                    <option value="">সকল অফিস</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>ব্রাশ নাম্বার দিয়ে অনুসন্ধান করুন</label>
            <div class="input-group">
                <input type="text" id="searchInput" placeholder="এখানে নাম্বার লিখুন...">
                <button class="btn-search" onclick="filterData()">🔍</button>
            </div>
        </div>
    </div>
    
    <div id="loader" style="text-align:center; display:none;">ডেটা লোড হচ্ছে...</div>
    <div id="result-area"></div>
</main>

<!-- Edit Modal -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <div style="overflow:hidden;">
            <button class="close-btn" onclick="closeModal()">&times;</button>
            <h3>তথ্য হালনাগাদ করুন</h3>
        </div>
        <form id="editForm" onsubmit="submitEdit(event)">
            <input type="hidden" id="editBpNo">
            
            <div style="display: flex; gap: 10px;">
                <div class="form-group" style="flex:1">
                    <label>র‍্যাঙ্ক</label>
                    <input type="text" id="displayRank" disabled style="background:#eee;">
                </div>
                <div class="form-group" style="flex:1">
                    <label>ব্রাশ নং</label>
                    <input type="text" id="displayBrushNo" disabled style="background:#eee;">
                </div>
            </div>

            <div class="form-group">
                <label>প্রোফাইল ছবি (১:১ রেশিও)</label>
                <div class="image-upload-area" onclick="document.getElementById('editPhoto').click()">
                    <span id="uploadPlaceholder">📷 ছবি সিলেক্ট করুন</span>
                    <img id="previewEditPhoto" class="preview-img">
                    <input type="file" id="editPhoto" accept="image/*" style="display:none;" onchange="previewImage(this)">
                </div>
            </div>

            <div class="form-group">
                <label>নাম (Name)</label>
                <input type="text" id="editName" required>
            </div>
            <div class="form-group">
                <label>বিপি নাম্বার (BP Number)</label>
                <input type="text" id="editNewBpNo" required>
            </div>
            <div class="form-group">
                <label>মোবাইল নাম্বার</label>
                <input type="text" id="editMobile" required>
            </div>
            <div class="form-group">
                <label>কর্মরত (Office/Unit)</label>
                <input type="text" id="editOffice" required placeholder="যেমন: ডিএমপি, র‍্যাব হেডকোয়ার্টার">
            </div>

            <button type="button" class="btn-cancel" onclick="closeModal()">বাতিল</button>
            <button type="submit" class="btn-submit">সাবমিট করুন</button>
        </form>
    </div>
</div>

<div id="toast">মেসেজ</div>

<script>
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycby1LuT5w5pro6HMPfdjvxSwn9lp-weHEWOgPfBMLMtX9F-leL-gI6IWcphpBcbfUMuOvg/exec"; 
    
    let allData = [];
    const bn2enMap = {
        '০': '0', '১': '1', '২': '2', '৩': '3', '৪': '4',
        '৫': '5', '৬': '6', '৭': '7', '৮': '8', '৯': '9'
    };

    function convertBnToEn(str) {
        if (!str) return '';
        return str.toString().replace(/[০-৯]/g, m => bn2enMap[m]);
    }

    window.addEventListener('DOMContentLoaded', () => {
        initApp();
    });

    document.getElementById("searchInput").addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            event.preventDefault();
            filterData();
        }
    });

    async function initApp() {
        const cachedRaw = localStorage.getItem('policeDirectoryCache');
        let cachedData = null;
        let localVersion = 0;

        if (cachedRaw) {
            try {
                const parsed = JSON.parse(cachedRaw);
                cachedData = parsed.data;
                localVersion = parsed.lastUpdated || 0;
                
                if (cachedData) {
                    allData = cachedData;
                    populateFilters(allData);
                    // হোম পেজে 'compact' ভিউ দেখাবে
                    renderData(allData, 'compact');
                }
            } catch (e) {
                console.error("Cache error:", e);
            }
        }

        try {
            const response = await fetch(GAS_API_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'getAllData' })
            });
            const result = await response.json();

            if (result.status === 'success') {
                const serverVersion = result.lastUpdated || 0;
                
                if (serverVersion > localVersion) {
                    allData = result.data;
                    const dataToStore = {
                        data: allData,
                        lastUpdated: serverVersion
                    };
                    localStorage.setItem('policeDirectoryCache', JSON.stringify(dataToStore));
                    populateFilters(allData);
                    // নতুন ডাটা লোড হলেও হোম পেজে 'compact' ভিউ থাকবে
                    renderData(allData, 'compact');
                }
            }
        } catch (error) {
            console.error("Fetch error:", error);
            if(!cachedData) showToast('সার্ভার কানেকশন এরর।');
        }
    }

    function populateFilters(data) {
        const rankSelect = document.getElementById('rankFilter');
        const officeSelect = document.getElementById('officeFilter');
        
        if (rankSelect.options.length <= 1) {
            const ranks = new Set(data.map(item => item.rank).filter(r => r));
            ranks.forEach(rank => {
                const option = document.createElement('option');
                option.value = rank;
                option.textContent = rank;
                rankSelect.appendChild(option);
            });

            const offices = new Set(data.map(item => item.office).filter(o => o));
            offices.forEach(office => {
                const option = document.createElement('option');
                option.value = office;
                option.textContent = office;
                officeSelect.appendChild(option);
            });
        }
    }

    // ভিউ টাইপ অনুযায়ী রেন্ডার করা ('compact' বা 'full')
    function renderData(data, viewType) {
        const container = document.getElementById('result-area');
        container.innerHTML = '';
        if (data.length === 0) {
            container.innerHTML = '<p style="text-align:center; padding:20px;">কোনো তথ্য পাওয়া যায়নি।</p>';
            return;
        }

        data.forEach((user) => {
            const mobileEn = convertBnToEn(user.mobile);
            const userImg = user.photo ? user.photo : 'https://via.placeholder.com/150?text=No+Img';
            const card = document.createElement('div');

            if (viewType === 'full') {
                // === ফুল কার্ড ভিউ ===
                card.className = 'full-card';
                card.innerHTML = `
                    <div class="profile-pic-container">
                        <img src="${userImg}" class="profile-pic" alt="Profile">
                    </div>
                    <span class="rank-badge">${user.rank}</span>
                    <h3 class="user-name">${user.name}</h3>
                    ${user.office ? `<div class="office-badge">${user.office}</div>` : ''}
                    
                    <div class="info-grid">
                        <div class="info-item">
                            <span class="info-label">ব্রাশ নং</span>
                            <span class="info-value">${user.brushNo}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">বিপি নং</span>
                            <span class="info-value">${user.bpNo}</span>
                        </div>
                        <div class="info-item" style="grid-column: span 2;">
                            <span class="info-label">মোবাইল</span>
                            <span class="info-value">${mobileEn}</span>
                        </div>
                    </div>

                    <div class="action-section">
                        <a href="tel:${mobileEn}" class="btn-action">📞 কল করুন</a>
                        <button onclick="copyToClipboard('${mobileEn}')" class="btn-action">📋 কপি</button>
                    </div>
                    
                    <button class="btn-edit" onclick="openEditModal('${user.bpNo}', '${user.rank}', '${user.brushNo}', '${user.name}', '${user.bpNo}', '${user.mobile}', '${user.office || ''}', '${user.photo || ''}')">
                        এডিট করুন
                    </button>
                `;
            } else {
                // === কমপ্যাক্ট ভিউ (হোম পেজ) ===
                card.className = 'compact-card';
                card.innerHTML = `
                    <div class="compact-left">
                        <span class="compact-brush">ব্রাশ: ${user.brushNo}</span>
                        <span class="compact-name">${user.name}</span>
                    </div>
                `;
            }
            container.appendChild(card);
        });
    }

    function filterData() {
        const searchInput = document.getElementById('searchInput');
        const rankFilter = document.getElementById('rankFilter');
        const officeFilter = document.getElementById('officeFilter');
        
        const query = searchInput.value.trim();
        const queryEn = convertBnToEn(query);
        const rank = rankFilter.value;
        const office = officeFilter.value;

        // ফিল্টারিং লজিক
        const filtered = allData.filter(user => {
            const matchRank = rank === '' || user.rank === rank;
            const matchOffice = office === '' || user.office === office;

            let matchSearch = false;
            if (query === '') {
                matchSearch = true;
            } else {
                const brushEn = convertBnToEn(user.brushNo);
                const nameEn = user.name.toLowerCase();
                const queryLower = query.toLowerCase();
                
                if (brushEn.includes(queryEn) || nameEn.includes(queryLower)) {
                    matchSearch = true;
                }
            }

            return matchRank && matchOffice && matchSearch;
        });
        
        // লজিক: যদি সার্চ বা ফিল্টার অ্যাক্টিভ থাকে তবে 'full' ভিউ, নাহলে 'compact'
        const isActiveSearch = (query !== '' || rank !== '' || office !== '');
        
        if (isActiveSearch) {
            renderData(filtered, 'full'); // সার্চে ফুল কার্ড
            // অটোমেটিক স্ক্রল করে রেজাল্টে নিয়ে আসা
            document.getElementById("result-area").scrollIntoView({ behavior: "smooth", block: "start" });
        } else {
            renderData(filtered, 'compact'); // হোম পেজে কমপ্যাক্ট ভিউ
        }
    }

    function copyToClipboard(text) {
        navigator.clipboard.writeText(text).then(() => showToast('নাম্বার কপি হয়েছে!'));
    }

    function previewImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('previewEditPhoto').src = e.target.result;
                document.getElementById('previewEditPhoto').style.display = 'block';
                document.getElementById('uploadPlaceholder').style.display = 'none';
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    function openEditModal(bpNo, rank, brushNo, name, bp, mobile, office, photo) {
        document.getElementById('editBpNo').value = bpNo;
        document.getElementById('displayRank').value = rank;
        document.getElementById('displayBrushNo').value = brushNo;
        document.getElementById('editName').value = name;
        document.getElementById('editNewBpNo').value = bp;
        document.getElementById('editMobile').value = mobile;
        document.getElementById('editOffice').value = office;
        
        const imgPreview = document.getElementById('previewEditPhoto');
        const placeholder = document.getElementById('uploadPlaceholder');
        
        if (photo) {
            imgPreview.src = photo;
            imgPreview.style.display = 'block';
            placeholder.style.display = 'none';
        } else {
            imgPreview.style.display = 'none';
            imgPreview.src = '';
            placeholder.style.display = 'block';
        }
        
        document.getElementById('editPhoto').value = '';
        document.getElementById('editModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('editModal').style.display = 'none';
    }

    // ১:১ সেন্টার ক্রপ লজিক
    function compressImage(file, maxSize, callback) {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = function(event) {
            const img = new Image();
            img.src = event.target.result;
            img.onload = function() {
                let width = img.width;
                let height = img.height;
                const size = Math.min(width, height);
                const sx = (width - size) / 2;
                const sy = (height - size) / 2;
                const canvas = document.createElement('canvas');
                canvas.width = maxSize;
                canvas.height = maxSize;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, sx, sy, size, size, 0, 0, maxSize, maxSize);
                callback(canvas.toDataURL('image/jpeg', 0.7));
            }
        }
    }

    async function submitEdit(e) {
        e.preventDefault();
        
        const newName = document.getElementById('editName').value;
        const newBpNo = document.getElementById('editNewBpNo').value;
        const newMobile = document.getElementById('editMobile').value;
        const newOffice = document.getElementById('editOffice').value;
        const bpNumber = document.getElementById('editBpNo').value;
        const fileInput = document.getElementById('editPhoto');

        showToast('প্রসেসিং হচ্ছে... অনুগ্রহ করে অপেক্ষা করুন।');

        let finalPhotoUrl = "";

        if (fileInput.files && fileInput.files[0]) {
            try {
                const uploadedUrl = await uploadImageToDrive(fileInput.files[0]);
                finalPhotoUrl = uploadedUrl;
            } catch (err) {
                console.error(err);
                showToast('ছবি আপলোডে সমস্যা হয়েছে। টেক্সট ডাটা সেভ করা হচ্ছে...');
            }
        }

        const payload = {
            action: 'updateRecord',
            bpNumber: bpNumber,
            newName: newName,
            newBpNo: newBpNo,
            newMobile: newMobile,
            newOffice: newOffice,
            newPhotoUrl: finalPhotoUrl
        };

        try {
            const response = await fetch(GAS_API_URL, {
                method: 'POST',
                body: JSON.stringify(payload)
            });
            const result = await response.json();
            if (result.status === 'success') {
                showToast(result.message);
                closeModal();
                initApp();
            } else {
                showToast('এরর: ' + result.message);
            }
        } catch (error) {
            showToast('নেটওয়ার্ক এরর।');
        }
    }

    async function uploadImageToDrive(file) {
        return new Promise((resolve, reject) => {
            compressImage(file, 800, async (base64String) => {
                try {
                    const response = await fetch(GAS_API_URL, {
                        method: 'POST',
                        body: JSON.stringify({
                            action: 'uploadImage',
                            imageBase64: base64String,
                            fileName: file.name
                        })
                    });
                    const result = await response.json();
                    if (result.status === 'success') {
                        resolve(result.url);
                    } else {
                        reject(result.message);
                    }
                } catch (err) {
                    reject(err);
                }
            });
        });
    }

    function showToast(msg) {
        const x = document.getElementById("toast");
        x.textContent = msg;
        x.className = "show";
        setTimeout(() => { x.className = x.className.replace("show", ""); }, 3000);
    }
    window.onclick = function(event) {
        if (event.target == document.getElementById('editModal')) closeModal();
    }
</script>
